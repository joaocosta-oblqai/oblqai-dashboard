name: Refresh snapshot & deploy dashboard

on:
  push:
    branches: [main]
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Refresh Airtable snapshot
        if: ${{ env.AIRTABLE_TOKEN != '' }}
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
        run: node scripts/snapshot.mjs

      - name: Commit refreshed snapshot (if changed)
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        run: |
          if [[ -n "$(git status --porcelain src/data/snapshot.json)" ]]; then
            git config user.name "oblqai-bot"
            git config user.email "bot@oblqai.com"
            git add src/data/snapshot.json
            git commit -m "chore(snapshot): daily Airtable refresh"
            git push
          else
            echo "No snapshot changes"
          fi

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
